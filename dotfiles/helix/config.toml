theme = "tokyonight_noit"

[editor]
line-number = "relative"
bufferline = "multiple"
cursorline = true
color-modes = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.inline-diagnostics]
cursor-line = "warning"

[keys.insert]
j = { k = "normal_mode" }
C-e = ["goto_line_end", "move_char_right"]
C-a = "goto_line_start"

[keys.normal]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
H = "goto_previous_buffer"
L = "goto_next_buffer"

[keys.select]
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"
